{% if include.js.sri %}
  <script src="{{ include.js.href }}" integrity="{{ include.js.sri }}" crossorigin="anonymous" {% if include.js.defer %}defer{% endif %}></script>
{% elsif include.js.href %}
  <script src="{{ include.js.href }}" {% if include.js.defer %}defer{% endif %}></script>
{% else %}
  <script src="{{ include.js }}" defer></script>
{% endif %}
